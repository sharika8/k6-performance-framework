name: Performance Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite
        required: true
        default: smoke
        type: choice
        options: [smoke, load, stress, spike, soak]
      environment:
        description: Environment
        required: true
        default: development
        type: choice
        options: [development, staging, production]

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6
      - name: Run smoke tests
        env:
          ENV: ${{ github.event.inputs.environment || 'development' }}
        run: k6 run tests/smoke/smoke.test.js --out json=reports/smoke-results.json
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: reports/
          retention-days: 30

  load:
    name: Load Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6
      - name: Run load tests
        env:
          ENV: ${{ github.event.inputs.environment || 'development' }}
        run: k6 run tests/load/load.test.js --out json=reports/load-results.json
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-results
          path: reports/
          retention-days: 30
